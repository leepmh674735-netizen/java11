# yubin.file=file
# yubin.interceptors=interceptors
# yubin.member=member
# yubin.pager=pager
# yubin.product=product
# yubin.review=review

# Trasaction 설정
# Service에
# 부모가 없는
spring.aop.proxy-target-class=true

# Messge 설정
spring.messages.basename=messges/message
spring.messages.encoding=UTF-8
#code가 업을 때 에러 발생
#true : 예외를 발생시키지 않고 key를 출력
#false : 예외를 발생
spring.messages.use-code-as-default-message=true

spring.messages.chane-duration=600