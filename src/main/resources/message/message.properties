# 기본 인사 및 환영 문구
hi=안녕하세요
welcome.login=환영합니다. {0}님 생일은 {1}입니다.

## [공통] 검증 annotation 명 = 메세지
NotBlank=필수 항목입니다.

## [특정 필드] 검증 annotation 명.필드명 = 메세지
NotBlank.username=ID는 필수입니다.
# DTO의 필드명이 password라면 .password로 맞춰주는 것이 좋습니다.
NotBlank.password=PW는 필수입니다.

## [정밀 제어] 검증 annotation 명.Bean name.멤버변수명 = 메세지
# {0}: 필드명, {1}: Max값, {2}: Min값
Size.memberDTO.password={0}는 {2}글자 이상 {1}글자 이하로 입력해주세요.